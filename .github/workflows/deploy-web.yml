name: Deploy Web

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: personal-dashboard
    env:
      OSS_ENDPOINT: oss-cn-shanghai.aliyuncs.com
      OSS_WEB_BUCKET: huhansen-web
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
        run: |
          missing=()
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_ID" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_ID")
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_SECRET")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing environment secrets (Settings → Environments → personal-dashboard):"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Install ossutil
        run: curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash

      - name: Ensure OSS web bucket exists
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
        run: |
          ossutil config -e "$OSS_ENDPOINT" -i "$ALIBABA_CLOUD_ACCESS_KEY_ID" -k "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" -L CH
          if ossutil ls "oss://${OSS_WEB_BUCKET}/" >/dev/null 2>&1; then
            echo "Bucket ${OSS_WEB_BUCKET} exists"
          elif ossutil mb "oss://${OSS_WEB_BUCKET}" -e "$OSS_ENDPOINT" --storage-class Standard; then
            echo "Created bucket ${OSS_WEB_BUCKET}"
            ossutil bucket-website --method put "oss://${OSS_WEB_BUCKET}" \
              --index-document index.html --error-document 404.html
            ossutil set-acl "oss://${OSS_WEB_BUCKET}" public-read
          else
            echo "::error::Bucket ${OSS_WEB_BUCKET} does not exist and could not be created (OSS UserDisable?). Create it manually in the OSS console (cn-shanghai): public-read, static website index index.html / error 404.html"
            exit 1
          fi

      - name: Upload static site to OSS
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
        run: |
          ossutil config -e "$OSS_ENDPOINT" -i "$ALIBABA_CLOUD_ACCESS_KEY_ID" -k "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" -L CH
          ossutil cp -r out/ "oss://${OSS_WEB_BUCKET}/" --update --force
