name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      stack:
        description: "Region stack"
        required: true
        default: ap-southeast-1
        type: choice
        options:
          - ap-southeast-1
          - cn-shanghai
          - qa
      action:
        description: "Terraform action"
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply

concurrency:
  group: terraform-${{ github.event.inputs.stack || 'prod' }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform-ap-southeast-1:
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.stack == 'ap-southeast-1'
    runs-on: ubuntu-latest
    environment: personal-dashboard
    env:
      TF_STACK: ap-southeast-1
      TF_WORKING_DIR: terraform
      TF_VERSION: "1.9.8"
      TF_VAR_region: ap-southeast-1
      TFVARS_FILE: env/ap-southeast-1.tfvars
      STATE_KEY: terraform-state-ap-southeast-1
      OTS_INSTANCE: pd-dash-sg
      OSS_WEB_BUCKET: pd-web-sg
      OSS_VAULT_BUCKET: pd-vault-sg
      CDN_DOMAIN: pd.huhansen.com
      ALICLOUD_ACCESS_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      ALICLOUD_SECRET_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
      ALICLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
      TF_VAR_role_arn: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
      TF_VAR_auth_secret: ${{ secrets.AUTH_SECRET }}
      TF_VAR_auth_microsoft_entra_id_id: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
      TF_VAR_auth_microsoft_entra_id_secret: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
      TF_VAR_runtime_access_key: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      TF_VAR_runtime_secret_key: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIBABA_CLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_MICROSOFT_ENTRA_ID_ID: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
          AUTH_MICROSOFT_ENTRA_ID_SECRET: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
        run: |
          missing=()
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_ID" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_ID")
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_SECRET")
          [ -z "$ALIBABA_CLOUD_ROLE_ARN" ] && missing+=("ALIBABA_CLOUD_ROLE_ARN")
          [ -z "$AUTH_SECRET" ] && missing+=("AUTH_SECRET")
          [ -z "$AUTH_MICROSOFT_ENTRA_ID_ID" ] && missing+=("AUTH_MICROSOFT_ENTRA_ID_ID")
          [ -z "$AUTH_MICROSOFT_ENTRA_ID_SECRET" ] && missing+=("AUTH_MICROSOFT_ENTRA_ID_SECRET")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing environment secrets (Settings → Environments → personal-dashboard):"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Restore Terraform state
        uses: actions/cache@v4
        with:
          path: terraform/terraform.tfstate
          key: ${{ env.STATE_KEY }}-${{ github.ref_name }}
          restore-keys: ${{ env.STATE_KEY }}-main

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Install aliyun CLI
        if: |
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'apply' || github.event.inputs.action == 'plan')) ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
          wget -q https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz
          tar -xzf aliyun-cli-linux-latest-amd64.tgz
          sudo mv aliyun /usr/local/bin/

      - name: Import existing resources (if created outside state)
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply') ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        env:
          ALICLOUD_REGION: ap-southeast-1
        run: bash scripts/import-existing.sh

      - name: Check FC custom domain DNS
        if: |
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'apply' || github.event.inputs.action == 'plan')) ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        id: fc_dns
        continue-on-error: true
        env:
          ALICLOUD_REGION: ap-southeast-1
        run: bash scripts/fc-verify-custom-domain-dns.sh

      - name: Terraform plan
        if: |
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan')
        run: |
          EXTRA=(-var-file="$TFVARS_FILE")
          if [ "${{ steps.fc_dns.outcome }}" != "success" ]; then
            echo "::warning::FC custom domain DNS not ready — planning with create_fc_custom_domain=false"
            EXTRA+=(-var="create_fc_custom_domain=false")
          fi
          terraform plan "${EXTRA[@]}" -input=false -no-color

      - name: Terraform apply
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply') ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
          EXTRA=(-var-file="$TFVARS_FILE")
          if [ "${{ steps.fc_dns.outcome }}" != "success" ]; then
            echo "::warning::FC custom domain DNS not ready — applying with create_fc_custom_domain=false"
            EXTRA+=(-var="create_fc_custom_domain=false")
          fi
          terraform apply "${EXTRA[@]}" -input=false -auto-approve

      - name: Upload Terraform state backup
        if: |
          always() &&
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' ||
           github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-ap-southeast-1-${{ github.run_id }}
          path: terraform/terraform.tfstate
          retention-days: 90
          if-no-files-found: ignore

  terraform-cn-shanghai:
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.stack == 'cn-shanghai') ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: personal-dashboard
    env:
      TF_STACK: cn-shanghai
      TF_WORKING_DIR: terraform
      TF_VERSION: "1.9.8"
      TF_VAR_region: cn-shanghai
      TFVARS_FILE: env/cn-shanghai.tfvars
      STATE_KEY: terraform-state-cn-shanghai
      OTS_INSTANCE: pd-dashboard
      OSS_WEB_BUCKET: huhansen-web
      OSS_VAULT_BUCKET: personal-dashboard-vault
      CDN_DOMAIN: pd.huhansen.cn
      CDN_ROOT_DOMAIN: huhansen.cn
      ALICLOUD_ACCESS_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      ALICLOUD_SECRET_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
      ALICLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
      TF_VAR_role_arn: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
      TF_VAR_auth_secret: ${{ secrets.AUTH_SECRET }}
      TF_VAR_auth_microsoft_entra_id_id: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
      TF_VAR_auth_microsoft_entra_id_secret: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
      TF_VAR_runtime_access_key: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      TF_VAR_runtime_secret_key: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIBABA_CLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_MICROSOFT_ENTRA_ID_ID: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
          AUTH_MICROSOFT_ENTRA_ID_SECRET: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
        run: |
          missing=()
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_ID" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_ID")
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_SECRET")
          [ -z "$ALIBABA_CLOUD_ROLE_ARN" ] && missing+=("ALIBABA_CLOUD_ROLE_ARN")
          [ -z "$AUTH_SECRET" ] && missing+=("AUTH_SECRET")
          [ -z "$AUTH_MICROSOFT_ENTRA_ID_ID" ] && missing+=("AUTH_MICROSOFT_ENTRA_ID_ID")
          [ -z "$AUTH_MICROSOFT_ENTRA_ID_SECRET" ] && missing+=("AUTH_MICROSOFT_ENTRA_ID_SECRET")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing environment secrets (Settings → Environments → personal-dashboard):"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Restore Terraform state
        uses: actions/cache@v4
        with:
          path: terraform/terraform.tfstate
          key: ${{ env.STATE_KEY }}-${{ github.ref_name }}
          restore-keys: ${{ env.STATE_KEY }}-main

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Install aliyun CLI
        if: |
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'apply' || github.event.inputs.action == 'plan')) ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
          wget -q https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz
          tar -xzf aliyun-cli-linux-latest-amd64.tgz
          sudo mv aliyun /usr/local/bin/

      - name: Import existing resources (if created outside state)
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply') ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        env:
          ALICLOUD_REGION: cn-shanghai
        run: bash scripts/import-existing.sh

      - name: Check CDN root-domain ownership
        if: |
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'apply' || github.event.inputs.action == 'plan')) ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        id: cdn_verify
        continue-on-error: true
        env:
          ALICLOUD_REGION: cn-shanghai
        run: bash scripts/cdn-verify-root-domain.sh

      - name: Check FC custom domain DNS
        if: |
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'apply' || github.event.inputs.action == 'plan')) ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        id: fc_dns
        continue-on-error: true
        env:
          ALICLOUD_REGION: cn-shanghai
        run: bash scripts/fc-verify-custom-domain-dns.sh

      - name: Ensure CAS certificate for CDN HTTPS
        if: |
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'apply' || github.event.inputs.action == 'plan')) ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        id: cas_cert
        continue-on-error: true
        env:
          ALICLOUD_REGION: cn-shanghai
          CDN_DOMAIN: pd.huhansen.cn
          CDN_HTTPS_ENABLED: "1"
          CAS_REGION: cn-hangzhou
          CAS_DNS_ZONE: huhansen.cn
          CAS_CONTACT_PHONE: ${{ secrets.CAS_CONTACT_PHONE }}
          ALLOWED_USER_EMAIL: huhansen318@hotmail.com
        run: bash scripts/cdn-ensure-cas-cert.sh

      - name: Terraform plan
        if: |
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan')
        env:
          AUTH_URL: ${{ secrets.AUTH_URL }}
        run: |
          EXTRA=(-var-file="$TFVARS_FILE")
          if [ -n "$AUTH_URL" ]; then EXTRA+=(-var="auth_url=$AUTH_URL"); fi
          if [ "${{ steps.cdn_verify.outcome }}" != "success" ]; then
            echo "::warning::CDN root domain not verified — planning with create_cdn_domain=false"
            EXTRA+=(-var="create_cdn_domain=false")
          fi
          if [ "${{ steps.fc_dns.outcome }}" != "success" ]; then
            echo "::warning::FC custom domain DNS not ready — planning with create_fc_custom_domain=false"
            EXTRA+=(-var="create_fc_custom_domain=false")
          fi
          if [ "${{ steps.cas_cert.outputs.cert_ready }}" = "true" ] && [ -n "${{ steps.cas_cert.outputs.cert_id }}" ]; then
            EXTRA+=(-var="cdn_cas_cert_id=${{ steps.cas_cert.outputs.cert_id }}")
          elif [ "${{ steps.cas_cert.outcome }}" != "success" ]; then
            echo "::warning::CAS certificate not ready — planning CDN without HTTPS"
          fi
          terraform plan "${EXTRA[@]}" -input=false -no-color

      - name: Terraform apply
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply') ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        env:
          AUTH_URL: ${{ secrets.AUTH_URL }}
        run: |
          EXTRA=(-var-file="$TFVARS_FILE")
          if [ -n "$AUTH_URL" ]; then EXTRA+=(-var="auth_url=$AUTH_URL"); fi
          if [ "${{ steps.cdn_verify.outcome }}" != "success" ]; then
            echo "::warning::CDN root domain not verified — applying with create_cdn_domain=false"
            EXTRA+=(-var="create_cdn_domain=false")
          fi
          if [ "${{ steps.fc_dns.outcome }}" != "success" ]; then
            echo "::warning::FC custom domain DNS not ready — applying with create_fc_custom_domain=false"
            EXTRA+=(-var="create_fc_custom_domain=false")
          fi
          if [ "${{ steps.cas_cert.outputs.cert_ready }}" = "true" ] && [ -n "${{ steps.cas_cert.outputs.cert_id }}" ]; then
            EXTRA+=(-var="cdn_cas_cert_id=${{ steps.cas_cert.outputs.cert_id }}")
          elif [ "${{ steps.cas_cert.outcome }}" != "success" ]; then
            echo "::warning::CAS certificate not ready — applying CDN without HTTPS"
          fi
          terraform apply "${EXTRA[@]}" -input=false -auto-approve

      - name: Upload Terraform state backup
        if: |
          always() &&
          ((github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply') ||
           (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-cn-shanghai-${{ github.run_id }}
          path: terraform/terraform.tfstate
          retention-days: 90
          if-no-files-found: ignore

  terraform-qa:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.stack == 'qa'
    runs-on: ubuntu-latest
    environment: personal-dashboard
    env:
      TF_STACK: qa
      TF_WORKING_DIR: terraform
      TF_VERSION: "1.9.8"
      TF_VAR_region: ap-southeast-1
      TFVARS_FILE: env/qa.tfvars
      # Fresh state key (the retired terraform/qa root used terraform-state-qa).
      STATE_KEY: terraform-state-qa-hosted
      OTS_INSTANCE: pd-dash-qa
      OSS_WEB_BUCKET: pd-web-qa
      OSS_VAULT_BUCKET: pd-vault-qa
      CDN_DOMAIN: pd-qa.huhansen.com
      FC_FUNCTION: api-qa
      ALICLOUD_ACCESS_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      ALICLOUD_SECRET_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
      ALICLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
      TF_VAR_role_arn: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
      TF_VAR_auth_secret: ${{ secrets.AUTH_SECRET }}
      TF_VAR_auth_microsoft_entra_id_id: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
      TF_VAR_auth_microsoft_entra_id_secret: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
      TF_VAR_runtime_access_key: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      TF_VAR_runtime_secret_key: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIBABA_CLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_MICROSOFT_ENTRA_ID_ID: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
          AUTH_MICROSOFT_ENTRA_ID_SECRET: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
        run: |
          missing=()
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_ID" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_ID")
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_SECRET")
          [ -z "$ALIBABA_CLOUD_ROLE_ARN" ] && missing+=("ALIBABA_CLOUD_ROLE_ARN")
          [ -z "$AUTH_SECRET" ] && missing+=("AUTH_SECRET")
          [ -z "$AUTH_MICROSOFT_ENTRA_ID_ID" ] && missing+=("AUTH_MICROSOFT_ENTRA_ID_ID")
          [ -z "$AUTH_MICROSOFT_ENTRA_ID_SECRET" ] && missing+=("AUTH_MICROSOFT_ENTRA_ID_SECRET")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing environment secrets (Settings → Environments → personal-dashboard):"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Restore Terraform state
        uses: actions/cache@v4
        with:
          path: terraform/terraform.tfstate
          key: ${{ env.STATE_KEY }}-${{ github.ref_name }}
          restore-keys: ${{ env.STATE_KEY }}-main

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Install aliyun CLI
        if: github.event.inputs.action == 'apply'
        run: |
          wget -q https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz
          tar -xzf aliyun-cli-linux-latest-amd64.tgz
          sudo mv aliyun /usr/local/bin/

      - name: Import existing resources (adopt the data-only QA resources)
        if: github.event.inputs.action == 'apply'
        env:
          ALICLOUD_REGION: ap-southeast-1
        run: bash scripts/import-existing.sh

      - name: Terraform plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -var-file="$TFVARS_FILE" -input=false -no-color

      - name: Terraform apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -var-file="$TFVARS_FILE" -input=false -auto-approve

      - name: Upload Terraform state backup
        if: always() && github.event.inputs.action == 'apply'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-qa-${{ github.run_id }}
          path: terraform/terraform.tfstate
          retention-days: 90
          if-no-files-found: ignore
