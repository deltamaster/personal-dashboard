name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: personal-dashboard
    env:
      TF_WORKING_DIR: terraform
      TF_VERSION: "1.9.8"
      TF_STATE_BUCKET: personal-dashboard-tfstate
      TF_STATE_PREFIX: personal-dashboard
      TF_VAR_region: cn-shanghai
      ALICLOUD_ACCESS_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      ALICLOUD_SECRET_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
      ALICLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
      TF_VAR_role_arn: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
      TF_VAR_acr_registry: ${{ secrets.ACR_REGISTRY }}
      TF_VAR_auth_secret: ${{ secrets.AUTH_SECRET }}
      TF_VAR_auth_microsoft_entra_id_id: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
      TF_VAR_auth_microsoft_entra_id_secret: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
      TF_VAR_runtime_access_key: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      TF_VAR_runtime_secret_key: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIBABA_CLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_MICROSOFT_ENTRA_ID_ID: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
          AUTH_MICROSOFT_ENTRA_ID_SECRET: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
        run: |
          missing=()
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_ID" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_ID")
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_SECRET")
          [ -z "$ALIBABA_CLOUD_ROLE_ARN" ] && missing+=("ALIBABA_CLOUD_ROLE_ARN")
          [ -z "$ACR_REGISTRY" ] && missing+=("ACR_REGISTRY")
          [ -z "$AUTH_SECRET" ] && missing+=("AUTH_SECRET")
          [ -z "$AUTH_MICROSOFT_ENTRA_ID_ID" ] && missing+=("AUTH_MICROSOFT_ENTRA_ID_ID")
          [ -z "$AUTH_MICROSOFT_ENTRA_ID_SECRET" ] && missing+=("AUTH_MICROSOFT_ENTRA_ID_SECRET")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing environment secrets (Settings → Environments → personal-dashboard):"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Validate apply-only secrets
        if: |
          github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' ||
          github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          missing=()
          [ -z "$ACR_USERNAME" ] && missing+=("ACR_USERNAME")
          [ -z "$ACR_PASSWORD" ] && missing+=("ACR_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing GitHub Actions secrets for apply:"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Install Alibaba Cloud CLI
        run: |
          wget -q https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz
          tar -xzf aliyun-cli-linux-latest-amd64.tgz
          sudo mv aliyun /usr/local/bin/

      - name: Assume provision role (for OSS state bucket access)
        run: |
          set -euo pipefail
          aliyun configure set \
            --profile default \
            --mode AK \
            --access-key-id "$ALICLOUD_ACCESS_KEY" \
            --access-key-secret "$ALICLOUD_SECRET_KEY" \
            --region cn-shanghai

          STS=$(aliyun sts AssumeRole \
            --RoleArn "$ALICLOUD_ROLE_ARN" \
            --RoleSessionName "github-terraform-${GITHUB_RUN_ID}" \
            --DurationSeconds 3600)

          echo "OSS_ACCESS_KEY_ID=$(echo "$STS" | jq -r '.Credentials.AccessKeyId')" >> "$GITHUB_ENV"
          echo "OSS_SECRET_ACCESS_KEY=$(echo "$STS" | jq -r '.Credentials.AccessKeySecret')" >> "$GITHUB_ENV"
          echo "OSS_SESSION_TOKEN=$(echo "$STS" | jq -r '.Credentials.SecurityToken')" >> "$GITHUB_ENV"

      - name: Install ossutil
        run: curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash

      - name: Ensure Terraform state bucket
        env:
          OSS_ENDPOINT: oss-cn-shanghai.aliyuncs.com
        run: |
          set -euo pipefail
          CONFIG="$HOME/.ossutilconfig"

          ossutil config -e "$OSS_ENDPOINT" \
            -i "$OSS_ACCESS_KEY_ID" -k "$OSS_SECRET_ACCESS_KEY" -t "$OSS_SESSION_TOKEN" \
            -L CH -c "$CONFIG"

          if ossutil stat "oss://${TF_STATE_BUCKET}/" -c "$CONFIG" >/dev/null 2>&1; then
            echo "Terraform state bucket already exists: ${TF_STATE_BUCKET}"
          else
            echo "Creating Terraform state bucket: ${TF_STATE_BUCKET}"
            ossutil mb "oss://${TF_STATE_BUCKET}" -c "$CONFIG" -e "$OSS_ENDPOINT" \
              -i "$OSS_ACCESS_KEY_ID" -k "$OSS_SECRET_ACCESS_KEY" -t "$OSS_SESSION_TOKEN"
          fi

          ossutil stat "oss://${TF_STATE_BUCKET}/" -c "$CONFIG"

      - name: Terraform init
        env:
          OSS_ENDPOINT: oss-cn-shanghai.aliyuncs.com
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=${TF_STATE_PREFIX}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=cn-shanghai" \
            -backend-config="endpoint=${OSS_ENDPOINT}" \
            -backend-config="access_key=${OSS_ACCESS_KEY_ID}" \
            -backend-config="secret_key=${OSS_SECRET_ACCESS_KEY}" \
            -backend-config="security_token=${OSS_SESSION_TOKEN}"

      - name: Bootstrap ACR repo (for FC placeholder image)
        if: |
          github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' ||
          github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          terraform apply -input=false -auto-approve \
            -target=alicloud_cr_namespace.main \
            -target=alicloud_cr_repo.api

      - name: Push placeholder container image to ACR
        if: |
          github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' ||
          github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          echo "$ACR_PASSWORD" | docker login "$ACR_REGISTRY" -u "$ACR_USERNAME" --password-stdin
          docker pull nginx:alpine
          docker tag nginx:alpine "$ACR_REGISTRY/personal-dashboard/api:latest"
          docker push "$ACR_REGISTRY/personal-dashboard/api:latest"

      - name: Terraform plan
        if: |
          github.event_name == 'pull_request' ||
          github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan'
        run: terraform plan -input=false -no-color

      - name: Terraform apply
        if: |
          github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' ||
          github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -input=false -auto-approve
