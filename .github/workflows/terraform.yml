name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      stack:
        description: "Region stack"
        required: true
        default: ap-southeast-1
        type: choice
        options:
          - ap-southeast-1
          - cn-shanghai
      action:
        description: "Terraform action"
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply

concurrency:
  group: terraform-${{ github.event.inputs.stack || 'ap-southeast-1' }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform-ap-southeast-1:
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.stack == 'ap-southeast-1'
    runs-on: ubuntu-latest
    environment: personal-dashboard
    env:
      TF_STACK: ap-southeast-1
      TF_WORKING_DIR: terraform
      TF_VERSION: "1.9.8"
      TF_VAR_region: ap-southeast-1
      TFVARS_FILE: env/ap-southeast-1.tfvars
      STATE_KEY: terraform-state-ap-southeast-1
      OTS_INSTANCE: pd-dash-sg
      OSS_WEB_BUCKET: pd-web-sg
      OSS_VAULT_BUCKET: pd-vault-sg
      ALICLOUD_ACCESS_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      ALICLOUD_SECRET_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
      ALICLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
      TF_VAR_role_arn: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
      TF_VAR_auth_secret: ${{ secrets.AUTH_SECRET }}
      TF_VAR_auth_microsoft_entra_id_id: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
      TF_VAR_auth_microsoft_entra_id_secret: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
      TF_VAR_runtime_access_key: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      TF_VAR_runtime_secret_key: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIBABA_CLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_MICROSOFT_ENTRA_ID_ID: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
          AUTH_MICROSOFT_ENTRA_ID_SECRET: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
        run: |
          missing=()
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_ID" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_ID")
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_SECRET")
          [ -z "$ALIBABA_CLOUD_ROLE_ARN" ] && missing+=("ALIBABA_CLOUD_ROLE_ARN")
          [ -z "$AUTH_SECRET" ] && missing+=("AUTH_SECRET")
          [ -z "$AUTH_MICROSOFT_ENTRA_ID_ID" ] && missing+=("AUTH_MICROSOFT_ENTRA_ID_ID")
          [ -z "$AUTH_MICROSOFT_ENTRA_ID_SECRET" ] && missing+=("AUTH_MICROSOFT_ENTRA_ID_SECRET")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing environment secrets (Settings → Environments → personal-dashboard):"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Restore Terraform state
        uses: actions/cache@v4
        with:
          path: terraform/terraform.tfstate
          key: ${{ env.STATE_KEY }}-${{ github.ref_name }}
          restore-keys: ${{ env.STATE_KEY }}-main

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Import existing resources (if created outside state)
        if: |
          github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' ||
          github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bash scripts/import-existing.sh

      - name: Terraform plan
        if: |
          github.event_name == 'pull_request' ||
          github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan'
        run: terraform plan -var-file="$TFVARS_FILE" -input=false -no-color

      - name: Terraform apply
        if: |
          github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' ||
          github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -var-file="$TFVARS_FILE" -input=false -auto-approve

      - name: Upload Terraform state backup
        if: |
          always() &&
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' ||
           github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-ap-southeast-1-${{ github.run_id }}
          path: terraform/terraform.tfstate
          retention-days: 90
          if-no-files-found: ignore

  terraform-cn-shanghai:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.stack == 'cn-shanghai'
    runs-on: ubuntu-latest
    environment: personal-dashboard
    env:
      TF_STACK: cn-shanghai
      TF_WORKING_DIR: terraform
      TF_VERSION: "1.9.8"
      TF_VAR_region: cn-shanghai
      TFVARS_FILE: env/cn-shanghai.tfvars
      STATE_KEY: terraform-state-cn-shanghai
      OTS_INSTANCE: pd-dashboard
      OSS_WEB_BUCKET: huhansen-web
      OSS_VAULT_BUCKET: personal-dashboard-vault
      ALICLOUD_ACCESS_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      ALICLOUD_SECRET_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
      ALICLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
      TF_VAR_role_arn: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
      TF_VAR_auth_secret: ${{ secrets.AUTH_SECRET }}
      TF_VAR_auth_microsoft_entra_id_id: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
      TF_VAR_auth_microsoft_entra_id_secret: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
      TF_VAR_runtime_access_key: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      TF_VAR_runtime_secret_key: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIBABA_CLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_MICROSOFT_ENTRA_ID_ID: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
          AUTH_MICROSOFT_ENTRA_ID_SECRET: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
        run: |
          missing=()
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_ID" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_ID")
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_SECRET")
          [ -z "$ALIBABA_CLOUD_ROLE_ARN" ] && missing+=("ALIBABA_CLOUD_ROLE_ARN")
          [ -z "$AUTH_SECRET" ] && missing+=("AUTH_SECRET")
          [ -z "$AUTH_MICROSOFT_ENTRA_ID_ID" ] && missing+=("AUTH_MICROSOFT_ENTRA_ID_ID")
          [ -z "$AUTH_MICROSOFT_ENTRA_ID_SECRET" ] && missing+=("AUTH_MICROSOFT_ENTRA_ID_SECRET")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing environment secrets (Settings → Environments → personal-dashboard):"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Restore Terraform state
        uses: actions/cache@v4
        with:
          path: terraform/terraform.tfstate
          key: ${{ env.STATE_KEY }}-${{ github.ref_name }}
          restore-keys: ${{ env.STATE_KEY }}-main

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Import existing resources (if created outside state)
        if: github.event.inputs.action == 'apply'
        run: bash scripts/import-existing.sh

      - name: Terraform plan
        if: github.event.inputs.action == 'plan'
        env:
          AUTH_URL: ${{ secrets.AUTH_URL }}
        run: |
          EXTRA=(-var-file="$TFVARS_FILE")
          if [ -n "$AUTH_URL" ]; then EXTRA+=(-var="auth_url=$AUTH_URL"); fi
          terraform plan "${EXTRA[@]}" -input=false -no-color

      - name: Terraform apply
        if: github.event.inputs.action == 'apply'
        env:
          AUTH_URL: ${{ secrets.AUTH_URL }}
        run: |
          EXTRA=(-var-file="$TFVARS_FILE")
          if [ -n "$AUTH_URL" ]; then EXTRA+=(-var="auth_url=$AUTH_URL"); fi
          terraform apply "${EXTRA[@]}" -input=false -auto-approve

      - name: Upload Terraform state backup
        if: always() && github.event.inputs.action == 'apply'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-cn-shanghai-${{ github.run_id }}
          path: terraform/terraform.tfstate
          retention-days: 90
          if-no-files-found: ignore
