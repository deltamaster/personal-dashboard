name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: personal-dashboard
    env:
      TF_WORKING_DIR: terraform
      TF_VERSION: "1.9.8"
      TF_VAR_region: cn-shanghai
      ALICLOUD_ACCESS_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      ALICLOUD_SECRET_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
      ALICLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
      TF_VAR_role_arn: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
      TF_VAR_acr_registry: ${{ secrets.ACR_REGISTRY }}
      TF_VAR_auth_secret: ${{ secrets.AUTH_SECRET }}
      TF_VAR_auth_microsoft_entra_id_id: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
      TF_VAR_auth_microsoft_entra_id_secret: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
      TF_VAR_runtime_access_key: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      TF_VAR_runtime_secret_key: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIBABA_CLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_MICROSOFT_ENTRA_ID_ID: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
          AUTH_MICROSOFT_ENTRA_ID_SECRET: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
        run: |
          missing=()
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_ID" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_ID")
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_SECRET")
          [ -z "$ALIBABA_CLOUD_ROLE_ARN" ] && missing+=("ALIBABA_CLOUD_ROLE_ARN")
          [ -z "$ACR_REGISTRY" ] && missing+=("ACR_REGISTRY")
          [ -z "$AUTH_SECRET" ] && missing+=("AUTH_SECRET")
          [ -z "$AUTH_MICROSOFT_ENTRA_ID_ID" ] && missing+=("AUTH_MICROSOFT_ENTRA_ID_ID")
          [ -z "$AUTH_MICROSOFT_ENTRA_ID_SECRET" ] && missing+=("AUTH_MICROSOFT_ENTRA_ID_SECRET")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing environment secrets (Settings → Environments → personal-dashboard):"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Validate apply-only secrets
        if: |
          github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' ||
          github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          missing=()
          [ -z "$ACR_USERNAME" ] && missing+=("ACR_USERNAME")
          [ -z "$ACR_PASSWORD" ] && missing+=("ACR_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing GitHub Actions secrets for apply:"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Restore Terraform state
        uses: actions/cache@v4
        with:
          path: terraform/terraform.tfstate
          key: terraform-state-${{ github.ref_name }}
          restore-keys: terraform-state-main

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Push placeholder container image to ACR
        if: |
          github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' ||
          github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          ACR_NAMESPACE: personal-dashboard
          ACR_REPO: api
        run: |
          set -euo pipefail
          IMAGE="${ACR_REGISTRY}/${ACR_NAMESPACE}/${ACR_REPO}:latest"

          echo "$ACR_PASSWORD" | docker login "$ACR_REGISTRY" -u "$ACR_USERNAME" --password-stdin

          echo "Checking repository ${ACR_NAMESPACE}/${ACR_REPO} exists..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "${ACR_USERNAME}:${ACR_PASSWORD}" \
            "https://${ACR_REGISTRY}/v2/${ACR_NAMESPACE}/${ACR_REPO}/tags/list")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::ACR repository ${ACR_NAMESPACE}/${ACR_REPO} is not accessible (HTTP ${HTTP_CODE})."
            echo "In ACR console (cn-shanghai): create namespace '${ACR_NAMESPACE}' and private repo '${ACR_REPO}', then re-run."
            echo "If names differ, set ACR_NAMESPACE and ACR_REPO environment secrets."
            exit 1
          fi

          docker pull nginx:alpine
          docker tag nginx:alpine "$IMAGE"
          docker push "$IMAGE"

      - name: Terraform plan
        if: |
          github.event_name == 'pull_request' ||
          github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan'
        run: terraform plan -input=false -no-color

      - name: Terraform apply
        if: |
          github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' ||
          github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -input=false -auto-approve

      - name: Upload Terraform state backup
        if: |
          always() &&
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' ||
           github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-${{ github.run_id }}
          path: terraform/terraform.tfstate
          retention-days: 90
          if-no-files-found: ignore
