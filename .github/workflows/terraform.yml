name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      stack:
        description: "Region stack"
        required: true
        default: ap-southeast-1
        type: choice
        options:
          - ap-southeast-1
          - cn-shanghai
      action:
        description: "Terraform action"
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply

concurrency:
  group: terraform-${{ github.event.inputs.stack || 'ap-southeast-1' }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: ap-southeast-1
            environment: personal-dashboard-sg
            tfvars: env/ap-southeast-1.tfvars
            state_key: terraform-state-ap-southeast-1
            region: ap-southeast-1
            ots_instance: pd-dash-sg
            oss_web_bucket: pd-web-sg
            oss_vault_bucket: pd-vault-sg
            auto_on_push: true
          - stack: cn-shanghai
            environment: personal-dashboard
            tfvars: env/cn-shanghai.tfvars
            state_key: terraform-state-cn-shanghai
            region: cn-shanghai
            ots_instance: pd-dashboard
            oss_web_bucket: huhansen-web
            oss_vault_bucket: personal-dashboard-vault
            auto_on_push: false
    if: |
      (github.event_name == 'push' && matrix.auto_on_push) ||
      (github.event_name == 'pull_request' && matrix.stack == 'ap-southeast-1') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.stack == matrix.stack)
    environment: ${{ matrix.environment }}
    env:
      TF_WORKING_DIR: terraform
      TF_VERSION: "1.9.8"
      TF_VAR_region: ${{ matrix.region }}
      ALICLOUD_ACCESS_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      ALICLOUD_SECRET_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
      ALICLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
      TF_VAR_role_arn: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
      TF_VAR_acr_registry: ${{ secrets.ACR_REGISTRY }}
      TF_VAR_auth_secret: ${{ secrets.AUTH_SECRET }}
      TF_VAR_auth_microsoft_entra_id_id: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
      TF_VAR_auth_microsoft_entra_id_secret: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
      TF_VAR_runtime_access_key: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      TF_VAR_runtime_secret_key: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
      OTS_INSTANCE: ${{ matrix.ots_instance }}
      OSS_WEB_BUCKET: ${{ matrix.oss_web_bucket }}
      OSS_VAULT_BUCKET: ${{ matrix.oss_vault_bucket }}
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIBABA_CLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_MICROSOFT_ENTRA_ID_ID: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_ID }}
          AUTH_MICROSOFT_ENTRA_ID_SECRET: ${{ secrets.AUTH_MICROSOFT_ENTRA_ID_SECRET }}
        run: |
          missing=()
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_ID" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_ID")
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_SECRET")
          [ -z "$ALIBABA_CLOUD_ROLE_ARN" ] && missing+=("ALIBABA_CLOUD_ROLE_ARN")
          [ -z "$ACR_REGISTRY" ] && missing+=("ACR_REGISTRY")
          [ -z "$AUTH_SECRET" ] && missing+=("AUTH_SECRET")
          [ -z "$AUTH_MICROSOFT_ENTRA_ID_ID" ] && missing+=("AUTH_MICROSOFT_ENTRA_ID_ID")
          [ -z "$AUTH_MICROSOFT_ENTRA_ID_SECRET" ] && missing+=("AUTH_MICROSOFT_ENTRA_ID_SECRET")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing environment secrets (Settings → Environments → ${{ matrix.environment }}):"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Validate apply-only secrets
        if: |
          github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' ||
          github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          missing=()
          [ -z "$ACR_USERNAME" ] && missing+=("ACR_USERNAME")
          [ -z "$ACR_PASSWORD" ] && missing+=("ACR_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing GitHub Actions secrets for apply:"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Restore Terraform state
        uses: actions/cache@v4
        with:
          path: terraform/terraform.tfstate
          key: ${{ matrix.state_key }}-${{ github.ref_name }}
          restore-keys: ${{ matrix.state_key }}-main

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Import existing resources (if created outside state)
        if: |
          github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' ||
          github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bash scripts/import-existing.sh

      - name: Push placeholder container image to ACR
        if: |
          github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' ||
          github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          ACR_NAMESPACE: personal-dashboard
          ACR_REPO: api
        run: |
          set -euo pipefail
          IMAGE="${ACR_REGISTRY}/${ACR_NAMESPACE}/${ACR_REPO}:latest"

          echo "$ACR_PASSWORD" | docker login "$ACR_REGISTRY" -u "$ACR_USERNAME" --password-stdin

          docker pull nginx:alpine
          docker tag nginx:alpine "$IMAGE"
          docker push "$IMAGE"

      - name: Terraform plan
        if: |
          github.event_name == 'pull_request' ||
          github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan'
        env:
          AUTH_URL: ${{ secrets.AUTH_URL }}
        run: |
          EXTRA=(-var-file="${{ matrix.tfvars }}")
          if [ -n "$AUTH_URL" ]; then EXTRA+=(-var="auth_url=$AUTH_URL"); fi
          terraform plan "${EXTRA[@]}" -input=false -no-color

      - name: Terraform apply
        if: |
          github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' ||
          github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          AUTH_URL: ${{ secrets.AUTH_URL }}
        run: |
          EXTRA=(-var-file="${{ matrix.tfvars }}")
          if [ -n "$AUTH_URL" ]; then EXTRA+=(-var="auth_url=$AUTH_URL"); fi
          terraform apply "${EXTRA[@]}" -input=false -auto-approve

      - name: Upload Terraform state backup
        if: |
          always() &&
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' ||
           github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-${{ matrix.stack }}-${{ github.run_id }}
          path: terraform/terraform.tfstate
          retention-days: 90
          if-no-files-found: ignore
