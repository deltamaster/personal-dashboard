name: Sync poster URLs in OTS

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no OTS writes)"
        required: false
        default: false
        type: boolean
      douban_id:
        description: "Single douban subject id (empty = all with OSS object)"
        required: false
        default: ""
        type: string

concurrency:
  group: sync-poster-urls-ots
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: personal-dashboard
    timeout-minutes: 30
    env:
      OTS_ENDPOINT: https://pd-dashboard.cn-shanghai.ots.aliyuncs.com
      OTS_INSTANCE_NAME: pd-dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Assume provision role
        id: sts
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIBABA_CLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq jq
          wget -q https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz
          tar -xzf aliyun-cli-linux-latest-amd64.tgz
          sudo mv aliyun /usr/local/bin/
          aliyun configure set \
            --profile default \
            --mode AK \
            --access-key-id "$ALIBABA_CLOUD_ACCESS_KEY_ID" \
            --access-key-secret "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" \
            --region cn-shanghai
          CREDS=$(aliyun sts AssumeRole \
            --RoleArn "$ALIBABA_CLOUD_ROLE_ARN" \
            --RoleSessionName "github-sync-poster-ots" \
            --DurationSeconds 3600)
          echo "access_key_id=$(echo "$CREDS" | jq -r '.Credentials.AccessKeyId')" >> "$GITHUB_OUTPUT"
          echo "access_key_secret=$(echo "$CREDS" | jq -r '.Credentials.AccessKeySecret')" >> "$GITHUB_OUTPUT"
          echo "security_token=$(echo "$CREDS" | jq -r '.Credentials.SecurityToken')" >> "$GITHUB_OUTPUT"

      - name: Sync OTS poster_url from OSS
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ steps.sts.outputs.access_key_id }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ steps.sts.outputs.access_key_secret }}
          ALIBABA_CLOUD_SECURITY_TOKEN: ${{ steps.sts.outputs.security_token }}
        run: |
          ARGS=(--stack cn-shanghai)
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS+=(--dry-run)
          ID="${{ inputs.douban_id }}"
          [ -n "$ID" ] && ARGS+=(--douban-id "$ID")
          python scripts/sync_poster_urls_ots.py "${ARGS[@]}"
