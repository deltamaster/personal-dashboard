name: Deploy API

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      stack:
        description: "Region stack"
        required: true
        default: ap-southeast-1
        type: choice
        options:
          - ap-southeast-1
          - cn-shanghai
          - qa

concurrency:
  group: deploy-api-${{ github.event.inputs.stack || 'ap-southeast-1' }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: personal-dashboard
    env:
      STACK: ${{ github.event.inputs.stack || 'ap-southeast-1' }}
      FC_REGION: ${{ github.event.inputs.stack == 'cn-shanghai' && 'cn-shanghai' || 'ap-southeast-1' }}
      FC_FUNCTION: ${{ github.event.inputs.stack == 'qa' && 'api-qa' || 'api' }}
      FC_CODE_KEY: ${{ github.event.inputs.stack == 'qa' && 'fc/api-qa.zip' || 'fc/api.zip' }}
      OSS_ENDPOINT: ${{ github.event.inputs.stack == 'cn-shanghai' && 'oss-cn-shanghai.aliyuncs.com' || 'oss-ap-southeast-1.aliyuncs.com' }}
      OSS_VAULT_BUCKET: ${{ github.event.inputs.stack == 'cn-shanghai' && 'personal-dashboard-vault' || github.event.inputs.stack == 'qa' && 'pd-vault-qa' || 'pd-vault-sg' }}
      OTS_INSTANCE_NAME: ${{ github.event.inputs.stack == 'cn-shanghai' && 'pd-dashboard' || github.event.inputs.stack == 'qa' && 'pd-dash-qa' || 'pd-dash-sg' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIBABA_CLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
        run: |
          missing=()
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_ID" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_ID")
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_SECRET")
          [ -z "$ALIBABA_CLOUD_ROLE_ARN" ] && missing+=("ALIBABA_CLOUD_ROLE_ARN")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing environment secrets for stack $STACK"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build and package API zip
        run: |
          npm ci
          npm run build:api
          npm run package:api

      - name: Install aliyun CLI
        run: |
          wget -q https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz
          tar -xzf aliyun-cli-linux-latest-amd64.tgz
          sudo mv aliyun /usr/local/bin/

      - name: Install ossutil
        run: curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash

      - name: Assume provision role
        id: sts
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIBABA_CLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
        run: |
          aliyun configure set \
            --profile default \
            --mode AK \
            --access-key-id "$ALIBABA_CLOUD_ACCESS_KEY_ID" \
            --access-key-secret "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" \
            --region "$FC_REGION"

          CREDS=$(aliyun sts AssumeRole \
            --RoleArn "$ALIBABA_CLOUD_ROLE_ARN" \
            --RoleSessionName "github-deploy-api-$STACK" \
            --DurationSeconds 3600)

          echo "access_key_id=$(echo "$CREDS" | jq -r '.Credentials.AccessKeyId')" >> "$GITHUB_OUTPUT"
          echo "access_key_secret=$(echo "$CREDS" | jq -r '.Credentials.AccessKeySecret')" >> "$GITHUB_OUTPUT"
          echo "security_token=$(echo "$CREDS" | jq -r '.Credentials.SecurityToken')" >> "$GITHUB_OUTPUT"

      - name: Upload API zip to OSS
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ steps.sts.outputs.access_key_id }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ steps.sts.outputs.access_key_secret }}
          ALIBABA_CLOUD_SECURITY_TOKEN: ${{ steps.sts.outputs.security_token }}
        run: |
          ossutil config -e "$OSS_ENDPOINT" -i "$ALIBABA_CLOUD_ACCESS_KEY_ID" -k "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" -t "$ALIBABA_CLOUD_SECURITY_TOKEN" -L CH
          ossutil cp api.zip "oss://${OSS_VAULT_BUCKET}/${FC_CODE_KEY}" --force

      - name: Update FC function code
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ steps.sts.outputs.access_key_id }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ steps.sts.outputs.access_key_secret }}
          ALIBABA_CLOUD_SECURITY_TOKEN: ${{ steps.sts.outputs.security_token }}
        run: |
          aliyun configure set \
            --profile default \
            --mode StsToken \
            --access-key-id "$ALIBABA_CLOUD_ACCESS_KEY_ID" \
            --access-key-secret "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" \
            --sts-token "$ALIBABA_CLOUD_SECURITY_TOKEN" \
            --region "$FC_REGION"

          aliyun fc PUT "/2023-03-30/functions/${FC_FUNCTION}" \
            --body "{
              \"code\": {
                \"ossBucketName\": \"${OSS_VAULT_BUCKET}\",
                \"ossObjectName\": \"${FC_CODE_KEY}\"
              }
            }"

      - name: Sync FC runtime env (AssumeRole + OTS/OSS)
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIBABA_CLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
          ALIBABA_CLOUD_ACCESS_KEY_ID_STS: ${{ steps.sts.outputs.access_key_id }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET_STS: ${{ steps.sts.outputs.access_key_secret }}
          ALIBABA_CLOUD_SECURITY_TOKEN: ${{ steps.sts.outputs.security_token }}
        run: |
          aliyun configure set \
            --profile default \
            --mode StsToken \
            --access-key-id "$ALIBABA_CLOUD_ACCESS_KEY_ID_STS" \
            --access-key-secret "$ALIBABA_CLOUD_ACCESS_KEY_SECRET_STS" \
            --sts-token "$ALIBABA_CLOUD_SECURITY_TOKEN" \
            --region "$FC_REGION"

          OTS_ENDPOINT="https://${OTS_INSTANCE_NAME}.${FC_REGION}.ots.aliyuncs.com"
          OSS_VAULT_REGION="oss-${FC_REGION}"

          CURRENT=$(aliyun fc GET "/2023-03-30/functions/${FC_FUNCTION}")
          MERGED=$(echo "$CURRENT" | jq \
            --arg ak "$ALIBABA_CLOUD_ACCESS_KEY_ID" \
            --arg sk "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" \
            --arg role "$ALIBABA_CLOUD_ROLE_ARN" \
            --arg session "personal-dashboard-fc" \
            --arg region "$FC_REGION" \
            --arg ots_endpoint "$OTS_ENDPOINT" \
            --arg ots_instance "$OTS_INSTANCE_NAME" \
            --arg oss_bucket "$OSS_VAULT_BUCKET" \
            --arg oss_region "$OSS_VAULT_REGION" \
            --arg oss_endpoint "$OSS_ENDPOINT" \
            '.environmentVariables = ((.environmentVariables // {}) + {
              ALIBABA_CLOUD_ACCESS_KEY_ID: $ak,
              ALIBABA_CLOUD_ACCESS_KEY_SECRET: $sk,
              ALIBABA_CLOUD_ROLE_ARN: $role,
              ALIBABA_CLOUD_ROLE_SESSION_NAME: $session,
              ALIBABA_CLOUD_REGION: $region,
              OTS_ENDPOINT: $ots_endpoint,
              OTS_INSTANCE_NAME: $ots_instance,
              OSS_VAULT_BUCKET: $oss_bucket,
              OSS_VAULT_REGION: $oss_region,
              OSS_VAULT_ENDPOINT: $oss_endpoint
            }) | { environmentVariables: .environmentVariables }')

          aliyun fc PUT "/2023-03-30/functions/${FC_FUNCTION}" --body "$MERGED"
