name: Deploy API

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      stack:
        description: "Region stack"
        required: true
        default: ap-southeast-1
        type: choice
        options:
          - ap-southeast-1
          - cn-shanghai

concurrency:
  group: deploy-api-${{ github.event.inputs.stack || 'ap-southeast-1' }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.stack == 'cn-shanghai' && 'personal-dashboard' || 'personal-dashboard-sg' }}
    env:
      STACK: ${{ github.event.inputs.stack || 'ap-southeast-1' }}
      FC_REGION: ${{ github.event.inputs.stack == 'cn-shanghai' && 'cn-shanghai' || 'ap-southeast-1' }}
      FC_FUNCTION: api
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIBABA_CLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          missing=()
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_ID" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_ID")
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_SECRET")
          [ -z "$ALIBABA_CLOUD_ROLE_ARN" ] && missing+=("ALIBABA_CLOUD_ROLE_ARN")
          [ -z "$ACR_REGISTRY" ] && missing+=("ACR_REGISTRY")
          [ -z "$ACR_USERNAME" ] && missing+=("ACR_USERNAME")
          [ -z "$ACR_PASSWORD" ] && missing+=("ACR_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing environment secrets for stack $STACK"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Log in to ACR
        uses: aliyun/acr-login@v1
        with:
          login-server: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        env:
          IMAGE: ${{ secrets.ACR_REGISTRY }}/personal-dashboard/api
        run: |
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Install aliyun CLI
        run: |
          wget -q https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz
          tar -xzf aliyun-cli-linux-latest-amd64.tgz
          sudo mv aliyun /usr/local/bin/

      - name: Update FC function
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIBABA_CLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
        run: |
          aliyun configure set \
            --profile default \
            --mode AK \
            --access-key-id "$ALIBABA_CLOUD_ACCESS_KEY_ID" \
            --access-key-secret "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" \
            --region "$FC_REGION"

          CREDS=$(aliyun sts AssumeRole \
            --RoleArn "$ALIBABA_CLOUD_ROLE_ARN" \
            --RoleSessionName "github-deploy-api-$STACK" \
            --DurationSeconds 3600)

          AK=$(echo "$CREDS" | jq -r '.Credentials.AccessKeyId')
          SK=$(echo "$CREDS" | jq -r '.Credentials.AccessKeySecret')
          ST=$(echo "$CREDS" | jq -r '.Credentials.SecurityToken')

          aliyun configure set \
            --profile default \
            --mode StsToken \
            --access-key-id "$AK" \
            --access-key-secret "$SK" \
            --sts-token "$ST" \
            --region "$FC_REGION"

          aliyun fc PUT "/2023-03-30/functions/${FC_FUNCTION}" \
            --body "{
              \"customContainerConfig\": {
                \"image\": \"${ACR_REGISTRY}/personal-dashboard/api:latest\",
                \"port\": 3000
              },
              \"memorySize\": 512,
              \"cpu\": 0.5,
              \"timeout\": 60,
              \"instanceConcurrency\": 1
            }"
