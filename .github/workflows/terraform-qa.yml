name: Terraform QA

on:
  pull_request:
    paths:
      - "terraform/qa/**"
      - ".github/workflows/terraform-qa.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply

concurrency:
  group: terraform-qa-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform-qa:
    runs-on: ubuntu-latest
    environment: personal-dashboard
    env:
      TF_WORKING_DIR: terraform/qa
      TF_VERSION: "1.9.8"
      TF_VAR_region: ap-southeast-1
      TFVARS_FILE: qa.tfvars
      STATE_KEY: terraform-state-qa
      ALICLOUD_ACCESS_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
      ALICLOUD_SECRET_KEY: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
      ALICLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
      TF_VAR_role_arn: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          ALIBABA_CLOUD_ROLE_ARN: ${{ secrets.ALIBABA_CLOUD_ROLE_ARN }}
        run: |
          missing=()
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_ID" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_ID")
          [ -z "$ALIBABA_CLOUD_ACCESS_KEY_SECRET" ] && missing+=("ALIBABA_CLOUD_ACCESS_KEY_SECRET")
          [ -z "$ALIBABA_CLOUD_ROLE_ARN" ] && missing+=("ALIBABA_CLOUD_ROLE_ARN")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing environment secrets (Settings → Environments → personal-dashboard):"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Restore Terraform state
        uses: actions/cache@v4
        with:
          path: terraform/qa/terraform.tfstate
          key: ${{ env.STATE_KEY }}-${{ github.ref_name }}
          restore-keys: ${{ env.STATE_KEY }}-main

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan
        if: |
          github.event_name == 'pull_request' ||
          github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan'
        run: terraform plan -var-file="$TFVARS_FILE" -input=false -no-color

      - name: Terraform apply
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
        run: terraform apply -var-file="$TFVARS_FILE" -input=false -auto-approve

      - name: Upload Terraform state backup
        if: always() && github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-qa-${{ github.run_id }}
          path: terraform/qa/terraform.tfstate
          retention-days: 90
          if-no-files-found: ignore
